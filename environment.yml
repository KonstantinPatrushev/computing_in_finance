name: cif
channels:
  - conda-forge
  - nodefaults

dependencies:
  - python=3.11
  - pip
  - numpy>=1.26,<2.2
  - pandas>=2.2,<2.3
  - pyarrow>=15.0
  - scipy>=1.13,<1.15
  - scikit-learn>=1.5,<1.6
  - cvxpy>=1.5
  - ecos
  - matplotlib>=3.8
  - seaborn>=0.13
  - pulp>=2.8
  - coincbc
  - requests
  - python-dotenv
  - pyyaml
  - joblib
  - tqdm
  - jupyterlab
  - ipykernel
  - pytest
  - pip:
      - yfinance>=0.2.40
      - apimoex>=1.4
      - dimod>=0.12
      - dwave-ocean-sdk>=8.0
      - qiskit>=1.2
      - qiskit-aer>=0.15
      - qiskit-ibm-runtime>=0.30
      - qiskit-optimization>=0.6
      - -e .
